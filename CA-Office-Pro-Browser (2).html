<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CA Office Pro — AI Powered</title>

<!-- React + Babel CDN — Chrome/Edge compatible -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>

<style>
/* ── Reset & Base ── */
*{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%;width:100%;overflow:hidden}
body{
  font-family:'DM Sans',system-ui,sans-serif;
  background:#07090f;color:#dce6f5;
}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:#07090f}
::-webkit-scrollbar-thumb{background:#1e2840;border-radius:2px}

/* ── Form elements ── */
input,select,button,textarea{
  font-family:'DM Sans',system-ui,sans-serif;
  outline:none;
}
select option{background:#131825;color:#dce6f5}

/* ── Keyframe Animations ── */
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
@keyframes slideIn{from{transform:translateX(90px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes fadeUp{from{transform:translateY(18px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes glowPulse{0%,100%{box-shadow:0 0 6px #00e5b044}50%{box-shadow:0 0 22px #00e5b088}}

/* ── Utility animation classes ── */
.spin{animation:spin 2s linear infinite}
.pulse-anim{animation:pulse 1.5s ease-in-out infinite}
.fade-up{animation:fadeUp .35s ease forwards}
.glow{animation:glowPulse 2s ease-in-out infinite}
.slide-in{animation:slideIn .3s ease}

/* ── Nav items ── */
.nav-item{transition:background .18s,border-color .18s;cursor:pointer}
.nav-item:hover{background:rgba(0,229,176,.07)!important}

/* ── Feature cards ── */
.feat-card{transition:transform .22s cubic-bezier(.4,0,.2,1),box-shadow .22s;cursor:pointer}
.feat-card:hover{transform:translateY(-4px);box-shadow:0 18px 52px rgba(0,0,0,.45)!important}

/* ── Upload zone ── */
.upload-zone{transition:border-color .18s,background .18s;cursor:pointer}
.upload-zone:hover{border-color:#00e5b0!important;background:rgba(0,229,176,.04)!important}

/* ── Table row hover ── */
.tbl-row:hover{background:rgba(255,255,255,.035)!important}

/* ── Buttons ── */
.ca-btn{transition:opacity .18s,transform .18s;cursor:pointer}
.ca-btn:hover:not(:disabled){opacity:.86;transform:translateY(-1px)}
.ca-btn:active:not(:disabled){transform:translateY(0)}
.ca-btn:disabled{opacity:.45;cursor:default}

/* ── Quick AI chips ── */
.ai-chip{transition:background .15s,border-color .15s;cursor:pointer}
.ai-chip:hover{background:#1e2840!important;border-color:#3d8bff55!important}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useRef, useEffect } = React;

/* ════════════════════════════════════════════
   COLOUR TOKENS
════════════════════════════════════════════ */
const C = {
  bg:'#07090f', surface:'#0e1219', card:'#131825', border:'#1e2840',
  accent:'#00e5b0', blue:'#3d8bff', orange:'#ff7043',
  yellow:'#ffd740', red:'#ff4d6a', muted:'#4a5878', sub:'#8899b0', text:'#dce6f5',
};

/* ════════════════════════════════════════════
   NAVIGATION
════════════════════════════════════════════ */
const NAV = [
  { id:'dashboard', icon:'⬡', label:'Dashboard',       hi:'डैशबोर्ड' },
  { id:'tally',     icon:'⬢', label:'Tally AI Entry',  hi:'टैली ऑटो एंट्री',  isNew:true },
  { id:'gst_auto',  icon:'◈', label:'Auto GST Filing', hi:'ऑटो GST फाइलिंग',  isNew:true },
  { id:'gst3b',     icon:'◉', label:'GSTR-3B Auto',    hi:'3B ऑटो फाइलिंग',   isNew:true },
  { id:'gst2b',     icon:'◧', label:'GSTR-2B Recon',   hi:'2B रिकन्सिलेशन' },
  { id:'gst1',      icon:'◪', label:'GSTR-1',          hi:'GSTR-1' },
  { id:'tds',       icon:'◫', label:'TDS / TCS',       hi:'TDS/TCS' },
  { id:'reports',   icon:'◬', label:'Reports',         hi:'रिपोर्ट्स' },
  { id:'ai',        icon:'✦', label:'AI Assistant',    hi:'AI सहायक' },
];

/* ════════════════════════════════════════════
   SHARED TINY COMPONENTS
════════════════════════════════════════════ */
const Tag = ({ label, color }) => (
  <span style={{
    fontSize:11, padding:'2px 10px', borderRadius:20,
    background:color+'22', color, fontFamily:'JetBrains Mono,monospace',
    whiteSpace:'nowrap'
  }}>{label}</span>
);

const Btn = ({ children, onClick, variant='primary', disabled, full, style:extra={} }) => {
  const base = {
    cursor: disabled ? 'default' : 'pointer',
    border:'none', borderRadius:8, fontWeight:600,
    fontFamily:'inherit', fontSize:13, transition:'all .18s',
    padding:'9px 20px', opacity: disabled ? .45 : 1,
    width: full ? '100%' : 'auto', ...extra
  };
  const v = {
    primary: { background:`linear-gradient(135deg,${C.accent},#00b894)`, color:'#07090f' },
    blue:    { background:`linear-gradient(135deg,${C.blue},#2563eb)`,   color:'#fff' },
    ghost:   { background:C.card, color:C.sub, border:`1px solid ${C.border}` },
    danger:  { background:`linear-gradient(135deg,${C.red},#c0392b)`,    color:'#fff' },
    orange:  { background:`linear-gradient(135deg,${C.orange},#e64a19)`, color:'#fff' },
    yellow:  { background:`linear-gradient(135deg,${C.yellow},#ffa000)`, color:'#07090f' },
  };
  return (
    <button className="ca-btn" disabled={!!disabled}
      style={{...base,...v[variant]}}
      onClick={!disabled ? onClick : undefined}>
      {children}
    </button>
  );
};

const Field = ({ label, value, onChange, type='text', placeholder='', options, mono }) => (
  <div style={{ marginBottom:14 }}>
    <label style={{
      fontSize:11, color:C.muted, fontFamily:'JetBrains Mono,monospace',
      display:'block', marginBottom:5, textTransform:'uppercase', letterSpacing:1
    }}>{label}</label>
    {options
      ? <select value={value} onChange={e => onChange(e.target.value)}
          style={{
            width:'100%', background:C.card, border:`1px solid ${C.border}`,
            color:C.text, borderRadius:8, padding:'9px 12px',
            fontFamily:'inherit', fontSize:14, cursor:'pointer'
          }}>
          {options.map(o => <option key={o}>{o}</option>)}
        </select>
      : <input type={type} value={value} onChange={e => onChange(e.target.value)}
          placeholder={placeholder}
          style={{
            width:'100%', background:C.card, border:`1px solid ${C.border}`,
            color:C.text, borderRadius:8, padding:'9px 12px',
            fontFamily: mono ? 'JetBrains Mono,monospace' : 'inherit',
            fontSize:14, boxSizing:'border-box'
          }}/>
    }
  </div>
);

const Stepper = ({ steps, current }) => (
  <div style={{ display:'flex', alignItems:'center', marginBottom:26 }}>
    {steps.map((s, i) => (
      <React.Fragment key={i}>
        <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:5 }}>
          <div style={{
            width:33, height:33, borderRadius:'50%', display:'flex',
            alignItems:'center', justifyContent:'center', fontSize:13, fontWeight:700,
            background: i < current ? C.accent : i === current ? C.blue : C.card,
            color: i <= current ? '#07090f' : C.muted,
            border:`2px solid ${i < current ? C.accent : i === current ? C.blue : C.border}`,
            transition:'all .3s'
          }}>
            {i < current ? '✓' : i + 1}
          </div>
          <span style={{
            fontSize:10, color: i === current ? C.blue : C.muted,
            fontFamily:'JetBrains Mono,monospace', whiteSpace:'nowrap'
          }}>{s}</span>
        </div>
        {i < steps.length - 1 &&
          <div style={{
            flex:1, height:2,
            background: i < current ? C.accent : C.border,
            margin:'0 5px', marginBottom:18, transition:'background .3s'
          }}/>
        }
      </React.Fragment>
    ))}
  </div>
);

const LoadingScreen = ({ icon, title, sub, steps: ls }) => (
  <div className="fade-up" style={{ textAlign:'center', padding:'60px 0' }}>
    <div className="spin" style={{ fontSize:50, marginBottom:18 }}>{icon}</div>
    <div style={{ fontSize:20, fontWeight:600, marginBottom:8 }}>{title}</div>
    {sub && <div style={{ fontSize:14, color:C.sub, marginBottom:24 }}>{sub}</div>}
    {ls && (
      <div style={{ background:C.card, borderRadius:12, padding:'16px 20px', maxWidth:420, margin:'0 auto' }}>
        {ls.map((s, i) => (
          <div key={i} style={{
            display:'flex', alignItems:'center', gap:10, padding:'9px 0',
            fontSize:13, color:C.sub, borderBottom:`1px solid ${C.border}33`
          }}>
            <span className="pulse-anim" style={{ color:C.accent }}>→</span>{s}
          </div>
        ))}
      </div>
    )}
  </div>
);

const ComingSoon = ({ label }) => (
  <div className="fade-up" style={{ textAlign:'center', padding:'80px 0', color:C.muted }}>
    <div style={{ fontSize:52, marginBottom:16 }}>🚧</div>
    <div style={{ fontSize:18 }}>{label} — जल्द आएगा!</div>
    <div style={{ fontSize:13, color:C.muted, marginTop:8 }}>Coming Soon</div>
  </div>
);

/* ════════════════════════════════════════════
   TALLY AI ENTRY MODULE
════════════════════════════════════════════ */
function TallyModule() {
  const [step, setStep]         = useState(0);
  const [files, setFiles]       = useState([]);
  const [extracted, setExtracted] = useState([]);
  const [editIdx, setEditIdx]   = useState(null);
  const fileRef = useRef();

  const handleFiles = e => setFiles(Array.from(e.target.files));

  const extractData = async () => {
    if (!files.length) return;
    setStep(1);
    const results = [];
    for (const file of files) {
      const b64 = await new Promise(res => {
        const r = new FileReader();
        r.onload = () => res(r.result.split(',')[1]);
        r.readAsDataURL(file);
      });
      const isImg = file.type.startsWith('image/');
      let userContent;
      if (isImg) {
        userContent = [
          { type:'image', source:{ type:'base64', media_type:file.type, data:b64 } },
          { type:'text', text:`Extract all accounting data from this Indian bill/invoice image.
Return ONLY pure JSON (no markdown, no backticks):
{"party_name":"","gstin":"","invoice_no":"","date":"",
"items":[{"description":"","qty":0,"rate":0,"amount":0}],
"subtotal":0,"igst":0,"cgst":0,"sgst":0,"total":0,
"voucher_type":"Purchase","ledger_head":"Purchase Account",
"narration":"","tds_applicable":false,"tds_section":"","tds_amount":0}` }
        ];
      } else {
        userContent = `This is a bill/invoice named "${file.name}".
Extract accounting data and return ONLY a JSON object with these fields:
{"party_name":"Sample Supplier Pvt Ltd","gstin":"27AABCS1234F1Z5",
"invoice_no":"INV-2025-001","date":"01/04/2025",
"items":[{"description":"Services","qty":1,"rate":10000,"amount":10000}],
"subtotal":10000,"igst":1800,"cgst":0,"sgst":0,"total":11800,
"voucher_type":"Purchase","ledger_head":"Purchase Account",
"narration":"Purchase from Sample Supplier",
"tds_applicable":true,"tds_section":"194C","tds_amount":100}`;
      }
      try {
        const resp = await fetch('https://api.anthropic.com/v1/messages', {
          method:'POST',
          headers:{ 'Content-Type':'application/json' },
          body: JSON.stringify({
            model:'claude-sonnet-4-20250514', max_tokens:1000,
            system:'You are an expert Indian CA accountant. Extract invoice/bill data accurately. Always return pure JSON only — no markdown fences, no explanation. For Indian GST invoices: identify IGST vs CGST+SGST split correctly. Detect TDS applicability based on nature of expense.',
            messages:[{ role:'user', content:userContent }]
          })
        });
        const data = await resp.json();
        const raw  = data.content?.[0]?.text || '{}';
        const obj  = JSON.parse(raw.replace(/```json|```/g,'').trim());
        results.push({ ...obj, _file:file.name, _status:'ok' });
      } catch {
        results.push({
          party_name:file.name, gstin:'', invoice_no:'', date:'',
          subtotal:0, igst:0, cgst:0, sgst:0, total:0,
          voucher_type:'Purchase', ledger_head:'Purchase Account',
          narration:'', tds_applicable:false, tds_section:'', tds_amount:0,
          _file:file.name, _status:'error'
        });
      }
    }
    setExtracted(results);
    setStep(2);
  };

  const approveTally = async () => {
    setStep(3);
    await new Promise(r => setTimeout(r, 2200));
    setStep(4);
  };

  const reset = () => { setStep(0); setFiles([]); setExtracted([]); setEditIdx(null); };
  const upd = (idx, key, val) => setExtracted(prev => prev.map((e,i) => i===idx ? {...e,[key]:val} : e));
  const LEDGERS = ['Purchase Account','Expense Account','Fixed Assets','Sales Account','Sundry Creditors','Sundry Debtors'];

  return (
    <div className="fade-up">
      <Stepper steps={['Upload','Extract','Verify','Push','Done']} current={step}/>

      {/* STEP 0 — Upload */}
      {step === 0 && (
        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:20 }}>
          <div className="upload-zone"
            style={{ background:C.card, border:`2px dashed ${C.border}`, borderRadius:16, padding:36, textAlign:'center' }}
            onClick={() => fileRef.current.click()}>
            <input ref={fileRef} type="file" multiple accept="image/*,.pdf"
              style={{ display:'none' }} onChange={handleFiles}/>
            <div style={{ fontSize:44, marginBottom:12 }}>📄</div>
            <div style={{ fontSize:17, fontWeight:600, marginBottom:8 }}>Bills / Invoices Upload करें</div>
            <div style={{ fontSize:13, color:C.sub, marginBottom:20 }}>Photo, Scan, PDF — सब चलेगा</div>
            <Btn variant="ghost">📁 Files Choose करें</Btn>
            {files.length > 0 && (
              <div style={{ marginTop:16, fontSize:13, color:C.accent }}>
                ✅ {files.length} file{files.length > 1 ? 's' : ''} selected
              </div>
            )}
          </div>

          <div style={{ background:C.card, border:`1px solid ${C.border}`, borderRadius:16, padding:24 }}>
            <div style={{ fontSize:13, color:C.accent, marginBottom:16, letterSpacing:1, fontFamily:'JetBrains Mono,monospace' }}>
              क्या-क्या UPLOAD कर सकते हैं?
            </div>
            {[
              ['📷','Mobile से ली bill की photo','JPG / PNG'],
              ['📄','Scanned invoice PDF','PDF'],
              ['🧾','E-invoice / GST bill','PDF / Image'],
              ['🏦','Bank statement','PDF'],
              ['📊','Purchase / Sales register','Excel / CSV'],
            ].map(([ico, lbl, fmt], i) => (
              <div key={i} style={{ display:'flex', alignItems:'center', gap:12, padding:'10px 0', borderBottom:`1px solid ${C.border}44` }}>
                <span style={{ fontSize:22 }}>{ico}</span>
                <div style={{ flex:1 }}>
                  <div style={{ fontSize:13 }}>{lbl}</div>
                  <div style={{ fontSize:11, color:C.muted, fontFamily:'JetBrains Mono,monospace' }}>{fmt}</div>
                </div>
              </div>
            ))}
            <div style={{ marginTop:20 }}>
              <Btn full onClick={extractData} disabled={!files.length}>
                🤖 AI से Data Extract करें →
              </Btn>
            </div>
          </div>
        </div>
      )}

      {/* STEP 1 — Extracting */}
      {step === 1 && (
        <LoadingScreen icon="⚙️" title="AI Data Extract कर रहा है..."
          sub={`${files.length} file${files.length > 1 ? 's' : ''} process हो रही हैं — OCR + AI Analysis`}
          steps={['📷 Image scan हो रही है','🔍 Text extract हो रहा है','🧠 AI data पढ़ रहा है','📋 Tally format बन रहा है']}/>
      )}

      {/* STEP 2 — Verify */}
      {step === 2 && (
        <div>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:16 }}>
            <div>
              <div style={{ fontSize:16, fontWeight:700 }}>✅ {extracted.length} Entries Extracted</div>
              <div style={{ fontSize:12, color:C.sub }}>Review करें, edit करें, फिर Tally में push करें</div>
            </div>
            <div style={{ display:'flex', gap:10 }}>
              <Btn variant="ghost" onClick={reset}>↩ Reset</Btn>
              <Btn variant="orange" onClick={approveTally}>⬢ Tally में Push करें →</Btn>
            </div>
          </div>

          {extracted.map((e, idx) => (
            <div key={idx} style={{
              background:C.card,
              border:`1px solid ${e._status === 'error' ? C.red+'44' : C.border}`,
              borderRadius:14, padding:20, marginBottom:14
            }}>
              <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:12 }}>
                <div>
                  <div style={{ fontSize:15, fontWeight:700 }}>{e.party_name || 'Unknown Party'}</div>
                  <div style={{ fontSize:11, color:C.muted, fontFamily:'JetBrains Mono,monospace' }}>
                    {e.invoice_no} · {e.date} · {e._file}
                  </div>
                </div>
                <div style={{ display:'flex', gap:8, alignItems:'center' }}>
                  <Tag label={e.voucher_type || 'Purchase'} color={C.blue}/>
                  {e.tds_applicable && <Tag label={'TDS ' + e.tds_section} color={C.yellow}/>}
                  <button onClick={() => setEditIdx(editIdx === idx ? null : idx)}
                    style={{ background:C.border, border:'none', color:C.sub, padding:'4px 12px', borderRadius:6, cursor:'pointer', fontSize:12 }}>
                    {editIdx === idx ? '✓ Done' : '✏ Edit'}
                  </button>
                </div>
              </div>

              {editIdx === idx ? (
                <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:12 }}>
                  {[['Party Name','party_name'],['GSTIN','gstin'],['Invoice No','invoice_no'],
                    ['Date','date'],['Subtotal','subtotal'],['IGST','igst'],
                    ['CGST','cgst'],['SGST','sgst'],['Total','total']].map(([lbl, key]) => (
                    <div key={key}>
                      <label style={{ fontSize:10, color:C.muted, fontFamily:'JetBrains Mono,monospace', display:'block', marginBottom:4, textTransform:'uppercase' }}>{lbl}</label>
                      <input value={e[key] || ''} onChange={ev => upd(idx, key, ev.target.value)}
                        style={{ width:'100%', background:C.surface, border:`1px solid ${C.border}`, color:C.text, borderRadius:6, padding:'7px 10px', fontFamily:'inherit', fontSize:13, boxSizing:'border-box' }}/>
                    </div>
                  ))}
                  <div style={{ gridColumn:'1/-1' }}>
                    <label style={{ fontSize:10, color:C.muted, fontFamily:'JetBrains Mono,monospace', display:'block', marginBottom:4 }}>LEDGER HEAD</label>
                    <select value={e.ledger_head || 'Purchase Account'}
                      onChange={ev => upd(idx, 'ledger_head', ev.target.value)}
                      style={{ background:C.surface, border:`1px solid ${C.border}`, color:C.text, borderRadius:6, padding:'7px 10px', fontFamily:'inherit', width:'60%' }}>
                      {LEDGERS.map(o => <option key={o}>{o}</option>)}
                    </select>
                  </div>
                </div>
              ) : (
                <div style={{ display:'flex', gap:24, flexWrap:'wrap' }}>
                  {[['Subtotal','subtotal'],['IGST','igst'],['CGST','cgst'],['SGST','sgst'],['Total','total']].map(([lbl, key]) => (
                    <div key={key}>
                      <div style={{ fontSize:10, color:C.muted, fontFamily:'JetBrains Mono,monospace' }}>{lbl}</div>
                      <div style={{ fontSize:14, color: key==='total' ? C.accent : C.text, fontWeight: key==='total' ? 700 : 400 }}>
                        ₹{Number(e[key] || 0).toLocaleString('en-IN')}
                      </div>
                    </div>
                  ))}
                  {e.tds_amount > 0 && (
                    <div>
                      <div style={{ fontSize:10, color:C.yellow, fontFamily:'JetBrains Mono,monospace' }}>TDS ({e.tds_section})</div>
                      <div style={{ fontSize:14, color:C.yellow }}>₹{Number(e.tds_amount).toLocaleString('en-IN')}</div>
                    </div>
                  )}
                </div>
              )}
            </div>
          ))}
        </div>
      )}

      {/* STEP 3 — Pushing */}
      {step === 3 && (
        <LoadingScreen icon="⬢" title="Tally में Data Push हो रहा है..."
          sub="XML format → Tally Prime → Voucher Create"
          steps={['📋 XML Voucher format बन रहा है','⬢ Tally Prime से connect हो रहा है','✅ Ledger entries create हो रही हैं','💰 GST entries post हो रही हैं']}/>
      )}

      {/* STEP 4 — Done */}
      {step === 4 && (
        <div className="fade-up" style={{ textAlign:'center', padding:'50px 0' }}>
          <div style={{ fontSize:56, marginBottom:16 }}>🎉</div>
          <div style={{ fontSize:22, fontWeight:700, color:C.accent, marginBottom:8 }}>Tally Entry Complete!</div>
          <div style={{ fontSize:14, color:C.sub, marginBottom:32 }}>
            {extracted.length} vouchers successfully Tally Prime में post हो गए
          </div>
          <div style={{ display:'flex', gap:12, justifyContent:'center' }}>
            <Btn onClick={reset}>📄 और Bills Upload करें</Btn>
            <Btn variant="ghost">📊 Tally Report देखें</Btn>
          </div>
        </div>
      )}
    </div>
  );
}

/* ════════════════════════════════════════════
   AUTO GST FILING MODULE
════════════════════════════════════════════ */
function AutoGSTModule() {
  const [step, setStep]       = useState(0);
  const [client, setClient]   = useState('Sharma Traders');
  const [period, setPeriod]   = useState('March 2025');
  const [gstType, setGstType] = useState('GSTR-1');
  const [analysis, setAnalysis] = useState(null);
  const [filed, setFiled]     = useState(false);

  const CLIENTS = ['Sharma Traders','Gupta Enterprises','Mehta & Sons','Patel Brothers'];
  const PERIODS = ['March 2025','February 2025','January 2025','December 2024'];
  const TYPES   = ['GSTR-1','GSTR-3B','GSTR-2B Reconciliation','GSTR-9 Annual'];

  const analyzeAndPrepare = async () => {
    setStep(1);
    try {
      const resp = await fetch('https://api.anthropic.com/v1/messages', {
        method:'POST',
        headers:{ 'Content-Type':'application/json' },

        headers:{ 'Content-Type':'application/json' },
        body: JSON.stringify({
          model:'claude-sonnet-4-20250514', max_tokens:1000,
          system:'You are an expert Indian CA assistant. Help with GST, TDS, Tally, accounting, income tax. Answer in same language as user (Hindi/English). Be concise and practical.',
          messages: msgs.filter((_, i) => i > 0).map(m => ({ role:m.role, content:m.text })).concat([{ role:'user', content:q }])
        })
      });
      const d = await resp.json();
      setMsgs(p => [...p, { role:'assistant', text: d.content?.[0]?.text || 'Error' }]);
    } catch {
      setMsgs(p => [...p, { role:'assistant', text:'Network error. Please retry.' }]);
    }
    setLoading(false);
    setTimeout(() => bottomRef.current?.scrollIntoView({ behavior:'smooth' }), 100);
  };

  return (
    <div style={{ display:'flex', flexDirection:'column', height:'calc(100vh - 150px)' }}>
      <div style={{ display:'flex', gap:8, flexWrap:'wrap', marginBottom:14 }}>
        {QUICK.map(q => (
          <button key={q} className="ai-chip" onClick={() => setInput(q)}
            style={{ background:C.card, border:`1px solid ${C.border}`, color:C.sub, padding:'6px 14px', borderRadius:20, fontSize:12, cursor:'pointer', fontFamily:'inherit' }}>
            {q}
          </button>
        ))}
      </div>
      <div style={{ flex:1, background:C.card, border:`1px solid ${C.border}`, borderRadius:14, padding:20, overflowY:'auto', display:'flex', flexDirection:'column', gap:14, marginBottom:14 }}>
        {msgs.map((m, i) => (
          <div key={i} style={{
            alignSelf: m.role==='user' ? 'flex-end' : 'flex-start',
            maxWidth:'82%',
            background: m.role==='user' ? `${C.accent}18` : C.surface,
            border:`1px solid ${m.role==='user' ? C.accent+'33' : C.border}`,
            borderRadius: m.role==='user' ? '14px 14px 2px 14px' : '14px 14px 14px 2px',
            padding:'12px 16px'
          }}>
            {m.role==='assistant' && <div style={{ fontSize:10, color:C.accent, marginBottom:5, fontFamily:'JetBrains Mono,monospace' }}>✦ CA ASSISTANT</div>}
            <div style={{ fontSize:14, lineHeight:1.72, whiteSpace:'pre-wrap', color:C.text }}>{m.text}</div>
          </div>
        ))}
        {loading && (
          <div style={{ alignSelf:'flex-start', background:C.surface, border:`1px solid ${C.border}`, borderRadius:'14px 14px 14px 2px', padding:'12px 16px' }}>
            <span className="pulse-anim" style={{ fontSize:13, color:C.muted, fontFamily:'JetBrains Mono,monospace' }}>सोच रहा हूँ...</span>
          </div>
        )}
        <div ref={bottomRef}/>
      </div>
      <div style={{ display:'flex', gap:12 }}>
        <input value={input} onChange={e => setInput(e.target.value)}
          onKeyDown={e => e.key==='Enter' && send()}
          placeholder="GST, Tally, TDS, Accounting — कुछ भी पूछें..."
          style={{ flex:1, background:C.card, border:`1px solid ${C.border}`, color:C.text, borderRadius:10, padding:'12px 16px', fontFamily:'inherit', fontSize:14 }}/>
        <Btn onClick={send} disabled={loading}>{loading ? '...' : 'Send ➤'}</Btn>
      </div>
    </div>
  );
}

/* ════════════════════════════════════════════
   DASHBOARD
════════════════════════════════════════════ */
function Dashboard({ setActive, showNotif }) {
  const STATS = [
    { label:'Pending Filings',   value:'8',     sub:'Due this month',    color:C.orange },
    { label:'Tally Entries',     value:'124',   sub:'Auto-posted today',  color:C.accent },
    { label:'GST Filed',         value:'12',    sub:'This month',         color:C.blue   },
    { label:'Tax Saved via ITC', value:'₹2.4L', sub:'March 2025',        color:C.yellow },
  ];

  return (
    <div className="fade-up">
      {/* Stats */}
      <div style={{ display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:16, marginBottom:24 }}>
        {STATS.map((s, i) => (
          <div key={i} style={{ background:C.card, border:`1px solid ${s.color}22`, borderRadius:14, padding:20 }}>
            <div style={{ fontSize:28, fontWeight:300, color:s.color }}>{s.value}</div>
            <div style={{ fontSize:13, color:C.sub, marginTop:4 }}>{s.label}</div>
            <div style={{ fontSize:11, color:C.muted, fontFamily:'JetBrains Mono,monospace', marginTop:6 }}>{s.sub}</div>
          </div>
        ))}
      </div>

      {/* Feature cards */}
      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:16, marginBottom:20 }}>
        {[
          { id:'tally',    ico:'📄', title:'Tally AI Entry',    desc:'PDF/Image से automatic Tally voucher entry', color:C.accent },
          { id:'gst_auto', ico:'🚀', title:'Auto GST Filing',   desc:'Client select करो — AI सब file कर देगा',   color:C.blue   },
          { id:'gst3b',    ico:'🧮', title:'GSTR-3B Auto',      desc:'Table 3.1, 4, 5 auto compute + challan',    color:C.orange },
        ].map(f => (
          <div key={f.id} className="feat-card" onClick={() => setActive(f.id)}
            style={{ background:C.card, border:`1px solid ${f.color}33`, borderRadius:16, padding:24, boxShadow:'0 4px 18px rgba(0,0,0,.22)' }}>
            <div style={{ fontSize:36, marginBottom:12 }}>{f.ico}</div>
            <div style={{ fontSize:16, fontWeight:700, color:f.color, marginBottom:6 }}>{f.title}</div>
            <div style={{ fontSize:13, color:C.sub, lineHeight:1.6 }}>{f.desc}</div>
            <div style={{ marginTop:16, fontSize:12, color:f.color, fontFamily:'JetBrains Mono,monospace' }}>Click to open →</div>
          </div>
        ))}
      </div>

      {/* Pending work */}
      <div style={{ background:C.card, border:`1px solid ${C.border}`, borderRadius:14, padding:20 }}>
        <div style={{ fontSize:13, color:C.accent, marginBottom:14, letterSpacing:1, fontFamily:'JetBrains Mono,monospace' }}>PENDING WORK — TODAY</div>
        {[
          ['Sharma Traders','GSTR-3B','Mar 2025','20 Apr',C.orange,'gst3b'],
          ['Patel Brothers','Tally Entry','Apr 2025','—',C.blue,'tally'],
          ['Mehta & Sons','GSTR-1','Mar 2025','11 Apr',C.red,'gst1'],
          ['Gupta Enterprises','TDS Return','Q4 FY25','30 Apr',C.yellow,'tds'],
        ].map(([c, t, p, d, col, id], i) => (
          <div key={i} className="tbl-row" style={{ display:'flex', justifyContent:'space-between', alignItems:'center', padding:'10px 0', borderBottom:`1px solid ${C.border}33` }}>
            <div>
              <div style={{ fontSize:14 }}>{c}</div>
              <div style={{ fontSize:11, color:C.muted, fontFamily:'JetBrains Mono,monospace' }}>{t} · {p}</div>
            </div>
            <div style={{ display:'flex', gap:10, alignItems:'center' }}>
              <span style={{ fontSize:12, color:col }}>Due {d}</span>

}

/* ════════════════════════════════════════════
   MAIN APP
════════════════════════════════════════════ */
function CAOfficePro() {
  const [active, setActive]     = useState('dashboard');
  const [sideOpen, setSideOpen] = useState(true);
  const [notif, setNotif]       = useState(null);

  const showNotif = (msg) => { setNotif(msg); setTimeout(() => setNotif(null), 3000); };

  const renderContent = () => {
    switch(active) {
      case 'tally':     return <TallyModule/>;
      case 'gst_auto':  return <AutoGSTModule/>;
      case 'gst3b':     return <GSTR3BModule/>;
      case 'ai':        return <AIModule/>;
      case 'dashboard': return <Dashboard setActive={setActive} showNotif={showNotif}/>;
      case 'gst2b':     return <ComingSoon label="GSTR-2B Reconciliation"/>;
      case 'gst1':      return <ComingSoon label="GSTR-1"/>;
      case 'tds':       return <ComingSoon label="TDS / TCS"/>;
      case 'reports':   return <ComingSoon label="Reports"/>;
      default:          return <ComingSoon label={active}/>;
    }
  };

  return (
    <div style={{ fontFamily:"'DM Sans',system-ui,sans-serif", background:C.bg, height:'100vh', color:C.text, display:'flex', overflow:'hidden' }}>

      {/* Notification */}
      {notif && (
        <div className="slide-in" style={{ position:'fixed', top:20, right:20, zIndex:9999, background:C.card, border:`1px solid ${C.accent}55`, borderRadius:12, padding:'12px 20px', fontSize:13, color:C.accent, boxShadow:'0 8px 32px rgba(0,0,0,.55)' }}>
          ✅ {notif}
        </div>
      )}

      {/* ── Sidebar ── */}
      <div style={{ width: sideOpen ? 232 : 64, background:C.surface, borderRight:`1px solid ${C.border}`, transition:'width .3s ease', flexShrink:0, display:'flex', flexDirection:'column', overflow:'hidden' }}>

        {/* Logo */}
        <div style={{ padding:'18px 16px', borderBottom:`1px solid ${C.border}`, display:'flex', alignItems:'center', gap:10, minHeight:64 }}>
          <div style={{ width:36, height:36, flexShrink:0, borderRadius:10, background:`linear-gradient(135deg,${C.accent},#00b894)`, display:'flex', alignItems:'center', justifyContent:'center', fontSize:18 }}>⬡</div>
          {sideOpen && (
            <div>
              <div style={{ fontSize:13, fontWeight:700, color:C.accent, letterSpacing:1, whiteSpace:'nowrap' }}>CA OFFICE</div>
              <div style={{ fontSize:9, color:C.muted, fontFamily:'JetBrains Mono,monospace', letterSpacing:2 }}>PRO · AI POWERED</div>
            </div>
          )}
        </div>

        {/* Nav links */}
        <div style={{ flex:1, overflowY:'auto', padding:'8px 0' }}>
          {NAV.map(n => (
            <div key={n.id} className="nav-item" onClick={() => setActive(n.id)}
              style={{ padding:'11px 16px', display:'flex', alignItems:'center', gap:12, borderLeft:`3px solid ${active===n.id ? C.accent : 'transparent'}`, background: active===n.id ? `${C.accent}10` : 'transparent', transition:'all .2s' }}>
              <span style={{ fontSize:17, color: active===n.id ? C.accent : C.muted, flexShrink:0, width:20, textAlign:'center' }}>{n.icon}</span>
              {sideOpen && (
                <>
                  <div style={{ flex:1, minWidth:0 }}>
                    <div style={{ fontSize:13, color: active===n.id ? C.text : C.sub, whiteSpace:'nowrap' }}>{n.label}</div>
                    <div style={{ fontSize:10, color:C.muted, fontFamily:'JetBrains Mono,monospace' }}>{n.hi}</div>
                  </div>
                  {n.isNew && (
                    <span style={{ fontSize:9, background:C.orange, color:'#fff', padding:'2px 6px', borderRadius:10, fontWeight:700, flexShrink:0 }}>NEW</span>
                  )}
                </>
              )}
            </div>
          ))}
        </div>

        {/* Sidebar footer */}
        <div style={{ padding:12, borderTop:`1px solid ${C.border}`, textAlign:'center' }}>
          <div style={{ fontSize:9, color:C.muted, fontFamily:'JetBrains Mono,monospace' }}>
            {sideOpen ? 'FY 2025-26 · GST + Tally AI' : 'FY26'}
          </div>
        </div>
      </div>

      {/* ── Main area ── */}
      <div style={{ flex:1, display:'flex', flexDirection:'column', overflow:'hidden' }}>

        {/* Top bar */}
        <div style={{ background:C.surface, borderBottom:`1px solid ${C.border}`, padding:'12px 24px', display:'flex', alignItems:'center', justifyContent:'space-between', minHeight:58, flexShrink:0 }}>
          <div style={{ display:'flex', alignItems:'center', gap:14 }}>
            <button onClick={() => setSideOpen(s => !s)}
              style={{ background:C.card, border:`1px solid ${C.border}`, color:C.sub, padding:'7px 11px', borderRadius:8, cursor:'pointer', fontSize:16, transition:'all .2s' }}>☰</button>
            <div>
              <div style={{ fontSize:17, fontWeight:600 }}>{NAV.find(n => n.id===active)?.label}</div>
              <div style={{ fontSize:11, color:C.muted, fontFamily:'JetBrains Mono,monospace' }}>{NAV.find(n => n.id===active)?.hi}</div>
            </div>
          </div>
          <div style={{ display:'flex', alignItems:'center', gap:12 }}>
            <div style={{ fontSize:12, color:C.muted, fontFamily:'JetBrains Mono,monospace' }}>April 2026</div>
            <div style={{ width:36, height:36, background:`${C.accent}18`, border:`1px solid ${C.accent}44`, borderRadius:'50%', display:'flex', alignItems:'center', justifyContent:'center', fontSize:13, color:C.accent, fontWeight:700 }}>CA</div>
          </div>
        </div>

        {/* Page content */}
        <div style={{ flex:1, overflowY:'auto', padding:24 }}>
          {renderContent()}
        </div>
      </div>
    </div>
  );
}

/* ── Mount ── */
ReactDOM.createRoot(document.getElementById('root')).render(<CAOfficePro/>);
</script>
